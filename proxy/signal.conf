<VirtualHost _default_:443>
    # Required for handling complex WebRTC routing tokens securely
    AllowEncodedSlashes NoDecode

    ServerName ${SIGNAL_FQDN}:443
    # ServerAdmin admin@example.com

    # Logging
    ErrorLog "logs/talk-error.log"
    TransferLog "logs/talk-access.log"
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile "conf/certs/${SIGNAL_FQDN}.crt"
    SSLCertificateKeyFile "conf/certs/${SIGNAL_FQDN}.key"
    # If using a CA-issued certificate, install the CA chain file here if required by your CA.

    # Security Headers
    
    # HSTS - Enforce HTTPS for 2 years + Subdomains + Preload
    Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains; preload"
    
    # Prevent MIME-type sniffing attacks
    Header always set X-Content-Type-Options "nosniff"
    
    # Prevent Nextcloud Talk from being framed maliciously by third parties
    Header always set X-Frame-Options "SAMEORIGIN"
    
    # Privacy protection for data leak via referrers
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # XSS Protection
    Header always set X-XSS-Protection "1; mode=block"

    # Block unused browser hardware APIs (Keep microphone/camera enabled for Talk!)
    Header always set Permissions-Policy "geolocation=(), microphone=(self), camera=(self)"

    # Proxy Core Settings
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On
    RewriteEngine On

    # Real IP Forwarding Headers
    # RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Real-IP expr=%{REMOTE_ADDR}

    ProxyPass / http://talk_hpb:8081/ upgrade=websocket
    ProxyPassReverse / http://talk_hpb:8081/

    # Backend is HTTP after SSL termination, so SSL proxy verification is not required here.
    SSLProxyVerify None
    SSLProxyCheckPeerCN Off
    SSLProxyCheckPeerName Off
</VirtualHost>
