services:
  # self signed SSL certificate for nextcloud, outdated
  # For a CA-issued valid SSL certificate, remove or ignore this service and mount your trusted cert/key/chain into the proxy container instead.
  omgwtfssl:
    image: paulczar/omgwtfssl
    container_name: omgwtfssl
    restart: "no"
    volumes:
      - ./certs:/certs
    environment:
      - SSL_SUBJECT=${NEXTCLOUD_FQDN}
      - CA_SUBJECT=nextcloud@example.com
      - SSL_KEY=/certs/${NEXTCLOUD_FQDN}.key
      - SSL_CSR=/certs/${NEXTCLOUD_FQDN}.csr
      - SSL_CERT=/certs/${NEXTCLOUD_FQDN}.crt
    # Entrypoint override to generate the bundle file automatically
    entrypoint: >
      /bin/sh -c "/usr/local/bin/generate-certs && 
      cat /certs/${NEXTCLOUD_FQDN}.crt /certs/ca.pem > /certs/${NEXTCLOUD_FQDN}-chain.crt"

  # self signed SSL certificate for collabora server, outdated
  # For a CA-issued valid SSL certificate, remove or ignore this service and provide trusted certificates to the proxy container.
  omgwtfssl2:
